<div class="page-container">
  <div class="card">
    <h1>Teil-Prüfungsmodus</h1>
    <p>Alle Fragen werden in zufälliger Reihenfolge angezeigt.</p>

    <div class="button-row">
      <button (click)="startExam()">Neue Fragerunde</button>
    </div>
  </div>

  <app-exam-question
    mode="partial"
    [questions]="questions"
    [sessionId]="sessionId">
  </app-exam-question>
</div>
